<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" href="data:," />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevLog — My Learning Journal</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  </head>
  <body>
    <!-- ── AUTH ── -->
    <div id="auth-section" class="auth-wrapper">
      <div class="auth-box">
        <div class="auth-logo">dev<span>log</span></div>
        <p class="auth-tagline">// your dsa learning journal</p>
        <input type="email" id="auth-email" placeholder="email" />
        <input type="password" id="auth-password" placeholder="password" />
        <button
          class="btn-primary"
          onclick="
            signIn(
              document.getElementById('auth-email').value,
              document.getElementById('auth-password').value,
            )
          ">
          login →
        </button>
        <button
          class="btn-secondary"
          onclick="
            signUp(
              document.getElementById('auth-email').value,
              document.getElementById('auth-password').value,
            )
          ">
          create account
        </button>
        <p class="auth-forgot">
          <a
            href="#"
            onclick="
              sendPasswordReset(document.getElementById('auth-email').value);
              return false;
            ">
            forgot password?
          </a>
        </p>
      </div>
    </div>

    <!-- ── RESET PASSWORD (shown only when arriving via recovery link) ── -->
    <div id="reset-section" class="auth-wrapper" style="display: none">
      <div class="auth-box">
        <div class="auth-logo">dev<span>log</span></div>
        <p class="auth-tagline">// set a new password</p>
        <input type="password" id="reset-password" placeholder="new password" />
        <input
          type="password"
          id="reset-password-confirm"
          placeholder="confirm new password" />
        <button
          class="btn-primary"
          onclick="
            submitNewPassword(
              document.getElementById('reset-password').value,
              document.getElementById('reset-password-confirm').value,
            )
          ">
          set new password →
        </button>
      </div>
    </div>

    <!-- ── APP ── -->
    <div id="app-section" style="display: none">
      <div class="app-wrapper">
        <!-- HEADER -->
        <header class="app-header">
          <div class="app-logo">dev<span>log</span></div>
          <div class="header-right">
            <span
              id="streak-badge"
              class="streak-badge"
              style="display: none"></span>
            <button class="logout-btn" onclick="signOut()">logout</button>
          </div>
        </header>

        <!-- CONTRIBUTION GRID -->
        <div class="grid-section">
          <p class="grid-label">// last 12 weeks</p>
          <div id="contribution-grid" class="contribution-grid"></div>
        </div>

        <!-- STAT ROW -->
        <div class="stat-row">
          <div class="stat-box">
            <span class="stat-num" id="stat-total">0</span>
            <span class="stat-lbl">total logs</span>
          </div>
          <div class="stat-box">
            <span class="stat-num" id="stat-streak">0</span>
            <span class="stat-lbl">day streak</span>
          </div>
          <div class="stat-box">
            <span class="stat-num" id="stat-topics">0</span>
            <span class="stat-lbl">topics</span>
          </div>
        </div>

        <!-- NAV -->
        <div class="nav-links">
          <a href="feed.html" class="nav-link">// community feed</a>
          <a href="profile.html" class="nav-link" id="profile-link"
            >// my profile</a
          >
        </div>

        <!-- ADD LOG TOGGLE -->
        <button class="btn-add-toggle" id="form-toggle" onclick="toggleForm()">
          + log today
        </button>

        <!-- LOG FORM -->
        <div class="log-form-section" id="log-form" style="display: none">
          <div class="form-label">// topic</div>
          <input
            type="text"
            id="topic"
            placeholder="e.g. Binary Search, Arrays, DP..." />
          <div class="form-label">// difficulty</div>
          <select id="difficulty">
            <option value="Easy">Easy</option>
            <option value="Medium" selected>Medium</option>
            <option value="Hard">Hard</option>
          </select>
          <div class="form-label">// what did you learn?</div>
          <textarea
            id="log"
            rows="5"
            placeholder="Write your insight, approach, key takeaway..."></textarea>

          <label class="code-toggle-label">
            <input
              type="checkbox"
              id="code-toggle"
              onchange="toggleCodeBox()" />
            add a code snippet
          </label>

          <div id="code-box" style="display: none">
            <select id="code-language">
              <option value="cpp" selected>C++</option>
              <option value="python">Python</option>
              <option value="java">Java</option>
              <option value="javascript">JavaScript</option>
              <option value="c">C</option>
            </select>
            <textarea
              id="code"
              rows="6"
              class="code-textarea"
              placeholder="paste your code here..."></textarea>
          </div>

          <button class="btn-log" onclick="saveLog()">save log ✓</button>
        </div>

        <!-- SEARCH -->
        <input
          type="text"
          class="search-box"
          id="search-box"
          placeholder="// search logs..."
          oninput="loadLogs()" />

        <!-- TAG FILTER -->
        <div class="tags-filter" id="tags-filter"></div>

        <!-- LOGS -->
        <div class="logs" id="logs-container"></div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
      function toggleForm() {
        const form = document.getElementById("log-form");
        const btn = document.getElementById("form-toggle");
        const open = form.style.display === "none";
        form.style.display = open ? "block" : "none";
        btn.textContent = open ? "✕ cancel" : "+ log today";
        btn.classList.toggle("open", open);
      }

      function toggleCodeBox() {
        const box = document.getElementById("code-box");
        const checked = document.getElementById("code-toggle").checked;
        box.style.display = checked ? "block" : "none";
      }
    </script>
  </body>
</html>
